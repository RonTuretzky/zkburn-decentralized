name: Deploy dapp to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Project site is served from https://<user>.github.io/<repo>/
      NEXT_PUBLIC_BASE_PATH: /zkburn-decentralized
      STATIC_EXPORT: "true"
      # Live, verified ZKBurn V2 contract on Gnosis mainnet.
      NEXT_PUBLIC_ZKBURN_ADDRESS: "0xE8bE1A3C20a484c66668c500E6306968f92ceb88"
      # CORS-friendly public RPC. No demo/simulate path in production — the only
      # registration route is a real zkPassport proof (dev-mode still accepts the
      # app's mock passports until the verifier lands on Gnosis).
      NEXT_PUBLIC_RPC_URL: https://gnosis-rpc.publicnode.com
      NEXT_PUBLIC_ZKPASSPORT_DEVMODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
